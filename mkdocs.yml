      - "0002 · Client-side gentx validation (WASM)": decisions/0002-client-side-gentx-validation-wasm.md
      - "0003 · Rehearsal is an optional bolt-on": decisions/0003-rehearsal-optional-bolt-on.md
      - "0004 · gentool library-first engine": decisions/0004-gentool-library-first-genesis-engine.md
      - "0005 · gentool mountable command tree": decisions/0005-gentool-mountable-command-tree.md
      - "0006 · Rehearsal engine in gentool": decisions/0006-rehearsal-engine-in-gentool.md
      - "0007 · Bridge fact-based trust boundary": decisions/0007-bridge-fact-based-trust-boundary.md
      - "0008 · Rehearsal write-back + lease": decisions/0008-rehearsal-write-back-and-lease.md
      - "0009 · Launch lifecycle state machine": decisions/0009-launch-lifecycle-state-machine.md
      - "0010 · M-of-N committee proposal governance": decisions/0010-m-of-n-committee-proposal-governance.md
