name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploy to GitHub Pages via the Actions flow (set Pages source = "GitHub Actions" in repo settings).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # `make build` creates the .venv, installs into it, and runs `mkdocs build --strict` — the same
      # path as local dev, so CI and your machine can't diverge.
      - name: Build (strict — fails on broken links / bad diagrams)
        run: make build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4